<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 16px; background: #fafafa; color: #333;
    }
    .header { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
    .header h1 { font-size: 16px; font-weight: 700; }
    .status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #666; margin-bottom: 12px; }
    .status .dot { width: 8px; height: 8px; border-radius: 50%; }
    .status .dot.on { background: #4CAF50; }
    .status .dot.off { background: #F44336; }

    .current-page { background: white; border-radius: 8px; padding: 12px; margin-bottom: 12px; border: 1px solid #eee; }
    .current-page .platform { font-size: 11px; color: #888; text-transform: uppercase; font-weight: 600; }
    .current-page .url { font-size: 12px; color: #555; word-break: break-all; margin-top: 4px; }

    .tag-input { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; margin-bottom: 12px; }
    .tag-input::placeholder { color: #aaa; }

    .collect-btn {
      width: 100%; padding: 10px; background: #2196F3; color: white; border: none;
      border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s;
    }
    .collect-btn:hover { background: #1976D2; }
    .collect-btn:disabled { background: #ccc; cursor: not-allowed; }
    .collect-btn.success { background: #4CAF50; }
    .collect-btn.error { background: #F44336; }

    .stats { display: flex; justify-content: space-around; margin-top: 12px; padding-top: 12px; border-top: 1px solid #eee; }
    .stat { text-align: center; }
    .stat .num { font-size: 18px; font-weight: 700; color: #333; }
    .stat .label { font-size: 10px; color: #888; }

    .footer { margin-top: 12px; text-align: center; }
    .footer a { font-size: 11px; color: #888; text-decoration: none; }
    .footer a:hover { color: #555; }
  </style>
</head>
<body>
  <div class="header">
    <span style="font-size: 24px;">📥</span>
    <h1>Content Collector</h1>
  </div>

  <div class="status" id="server-status">
    <span class="dot off" id="status-dot"></span>
    <span id="status-text">연결 확인 중...</span>
  </div>

  <div class="current-page">
    <div class="platform" id="platform">-</div>
    <div class="url" id="page-url">-</div>
  </div>

  <input type="text" class="tag-input" id="tags" placeholder="#태그1 #태그2 (선택)">

  <button class="collect-btn" id="collect-btn" disabled>📥 수집하기</button>

  <div class="stats">
    <div class="stat">
      <div class="num" id="yt-count">-</div>
      <div class="label">YouTube</div>
    </div>
    <div class="stat">
      <div class="num" id="th-count">-</div>
      <div class="label">Threads</div>
    </div>
    <div class="stat">
      <div class="num" id="ig-count">-</div>
      <div class="label">Instagram</div>
    </div>
  </div>

  <div class="footer">
    <a href="#" id="settings-link">설정</a>
  </div>

  <script src="../utils/api.js"></script>
  <script src="../utils/storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
